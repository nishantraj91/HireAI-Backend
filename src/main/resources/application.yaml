spring:
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/defaultdb?ssl-mode=REQUIRED
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    database-platform: org.hibernate.dialect.MySQLDialect
    hibernate:
      ddl-auto: update
    show-sql: true